name: Pipeline CI/CD

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Tests Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run database migrations
      run: npx prisma migrate dev --name init
      env:
        DATABASE_URL: "file:./test.db"

    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      env:
        NODE_ENV: test
        JWT_SECRET: test_jwt_secret_for_ci

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: ./backend
        flags: backend
        name: backend-coverage

  frontend-tests:
    name: Tests Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      env:
        CI: true

    - name: Build frontend
      run: npm run build
      env:
        VITE_API_URL: http://localhost:3000/api

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: ./frontend
        flags: frontend
        name: frontend-coverage

  security-audit:
    name: Audit de Sécurité
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Audit backend dependencies
      run: |
        cd backend
        npm audit --audit-level high

    - name: Audit frontend dependencies
      run: |
        cd frontend
        npm audit --audit-level high

  lint:
    name: Qualité du Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint backend
      run: |
        cd backend
        npm run lint

    - name: Lint frontend
      run: |
        cd frontend
        npm run lint

    - name: Type check backend
      run: |
        cd backend
        npm run build

    - name: Type check frontend
      run: |
        cd frontend
        npm run build
      env:
        VITE_API_URL: http://localhost:3000/api

  integration-tests:
    name: Tests d'Intégration
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: openpayfit_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Generate Prisma client
      run: |
        cd backend
        npx prisma generate

    - name: Run database migrations
      run: |
        cd backend
        npx prisma migrate deploy
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openpayfit_test

    - name: Start backend server
      run: |
        cd backend
        npm start &
        sleep 10
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/openpayfit_test
        JWT_SECRET: test_jwt_secret_for_integration
        PORT: 3000

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run E2E tests (if available)
      run: |
        cd frontend
        # npm run test:e2e (uncomment when E2E tests are implemented)
        echo "E2E tests would run here"
      env:
        VITE_API_URL: http://localhost:3000/api